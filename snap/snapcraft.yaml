name: openstack-hypervisor
version: '2024.1'
base: core24
summary: OpenStack Hypervisor
description: |
  The OpenStack Hypervisor snap provides the requires components
  to operate a cloud hypervisor as part of an OpenStack deployment.
assumes:
- snapd2.73
grade: stable
confinement: strict
environment:
  LC_ALL: C
  PATH: $SNAP/usr/sbin:$SNAP/usr/bin:$SNAP/sbin:$SNAP/bin:$SNAP/usr/local/bin:$SNAP/usr/local/sbin:$PATH
  # Standard library components must have priority in module name resolution: https://storyboard.openstack.org/#!/story/2007806
  PYTHONPATH: $PYTHONPATH:$SNAP/usr/lib/python3.12:$SNAP/usr/lib/python3.12/site-packages:$SNAP/usr/lib/python3/dist-packages:$SNAP/lib/python3.12:$SNAP/lib/python3.12/site-packages
  # OVN runtime configuration
  OVN_LOGDIR: $SNAP_COMMON/log/ovn
  OVN_RUNDIR: $SNAP_COMMON/run/ovn
  OVN_SYSCONFDIR: $SNAP_COMMON/etc
  OVN_PKGDATADIR: $SNAP/usr/share/ovn
  OVN_BINDIR: $SNAP/usr/bin
  OVN_SBINDIR: $SNAP/usr/sbin
  # OVS runtime configuration
  OVS_LOGDIR: $SNAP_COMMON/log/openvswitch
  OVS_RUNDIR: $SNAP_COMMON/run/openvswitch
  OVS_SYSCONFDIR: $SNAP_COMMON/etc
  OVS_PKGDATADIR: $SNAP/usr/share/openvswitch
  OVS_BINDIR: $SNAP/usr/bin
  OVS_SBINDIR: $SNAP/usr/sbin
  RUNTIME_DIRECTORY: $SNAP_COMMON/run

platforms:
  amd64:
  arm64:
  s390x:

system-usernames:
  snap_daemon: shared

layout:
  /usr/local/bin:
    symlink: $SNAP/usr/local/bin
  /usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/ceph:
    symlink: $SNAP/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/ceph
  /usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/qemu:
    symlink: $SNAP/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/qemu
  /usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/pulseaudio:
    symlink: $SNAP/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/pulseaudio
  /usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/swtpm:
    symlink: $SNAP/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/swtpm
  /usr/lib/libvirt:
    symlink: $SNAP/usr/lib/libvirt
  /usr/share/libvirt:
    symlink: $SNAP/usr/share/libvirt
  /usr/share/qemu:
    symlink: $SNAP/usr/share/qemu
  # For UEFI Support, bindmount the OVMF and AAVMF directories
  # appropriately. UEFI support is required for aarch64.
  /usr/share/OVMF:
    symlink: $SNAP/usr/share/OVMF
  /usr/share/AAVMF:
    symlink: $SNAP/usr/share/AAVMF
  /var/lib/libvirt:
    symlink: $SNAP_DATA/var/lib/libvirt
  /var/lib/openstack-hypervisor:
    bind: $SNAP_COMMON
  /usr/lib/multipath:
    symlink: $SNAP/lib/multipath
  /etc/swtpm_setup.conf:
    symlink: $SNAP_COMMON/etc/swtpm_setup.conf

apps:
  openstack-hypervisor:
    environment:
      # Ensure site packages are loaded first
      PYTHONPATH: $SNAP/usr/lib/python3.10:$SNAP/usr/lib/python3.10/site-packages:$SNAP/lib/python3.10:$SNAP/lib/python3.10/site-packages:$SNAP/usr/lib/python3/dist-packages:$PYTHONPATH
    command: bin/hypervisor
    plugs:
      - network
      - network-observe
      - network-setup-control
      - ovn-chassis
      - hardware-observe

  # Libvirt
  libvirtd:
    environment:
      # overriding usr/bin path to current, to ensure the symlink to qemu-system-* is not dependent on the snap revision
      PATH: $SNAP/../current/usr/bin:$SNAP/usr/sbin:$SNAP/usr/bin:$SNAP/sbin:$SNAP/bin:$SNAP/usr/local/bin:$SNAP/usr/local/sbin:$PATH
    command: usr/sbin/libvirtd --pid $SNAP_DATA/libvirt.pid --listen
    daemon: simple
    plugs:
      - network
      - network-bind
      - network-control
      - netlink-connector
      - netlink-audit
      - libvirt
      - opengl
      - raw-usb
      - hardware-observe
      - hugepages-control
      - kvm
      - kernel-module-control
      - kernel-module-observe
      - process-control
      - mount-observe
      - block-devices
      - microstack-support
      - system-observe
      - dm-multipath
      - nvme-control
      - iscsi-initiator
    # Make sure KillMode=process is set in the resulting systemd unit instead of
    # the default KillMode=control-group to avoid the situation where stopping
    # libvirtd causes the forced power off scenario for all VMs; it also affects
    # snap refreshes as libvirtd is restarted in this case.
    # Removing the snap will still result in VMs being forcefully powered off which
    # is intended.
    stop-mode: sigterm

  virtlogd:
    command: usr/sbin/virtlogd --pid $SNAP_DATA/virtlogd.pid
    daemon: simple
    plugs:
      - network
      - network-bind
      - network-control
      - microstack-support
      - system-observe
  virsh:
    command: usr/bin/virsh
    plugs:
      - network
      - microstack-support

  # Openvswitch
  ovs-vswitchd:
    command: usr/share/openvswitch/scripts/ovs-ctl --no-ovsdb-server --no-monitor start
    stop-command: usr/share/openvswitch/scripts/ovs-ctl --no-ovsdb-server stop
    after: [ovsdb-server]
    daemon: forking
    install-mode: disable
    plugs:
      - network
      - network-bind
      - network-control
      - firewall-control
      - openvswitch-support
      - process-control
      - system-trace
      - hardware-observe
      - hugepages-control
      - microstack-support

  ovsdb-server:
    command: "bin/ovsdb-server-service"
    stop-command: usr/share/openvswitch/scripts/ovs-ctl --no-ovs-vswitchd stop
    daemon: forking
    install-mode: disable
    plugs:
      - network
      - network-bind
      - network-control
      - openvswitch-support
      - process-control
      - system-trace
      - microstack-support

  # OVN
  ovn-controller:
    command: usr/share/ovn/scripts/ovn-ctl start_controller --no-monitor
    stop-command: usr/share/ovn/scripts/ovn-ctl stop_controller --no-monitor --restart
    daemon: forking
    install-mode: disable
    plugs:
      - network
      - network-bind
      - network-control
      - openvswitch-support
      - process-control
      - system-trace
      - microstack-support
    after:
      - ovsdb-server
      - ovs-vswitchd

  # OVS/OVN cli tools
  ovn-appctl:
    command: usr/bin/ovn-appctl
    plugs:
      - network
      - network-bind
      - microstack-support
      - ovn-chassis
  ovn-trace:
    command: usr/bin/ovn-trace
    plugs:
      - network
      - network-bind
      - microstack-support
      - ovn-chassis
  ovn-detrace:
    command: usr/bin/ovn-detrace
    plugs:
      - network
      - network-bind
      - microstack-support
      - ovn-chassis
  ovs-vsctl:
    command: usr/bin/ovs-vsctl
    plugs:
      - network
      - network-control
      - process-control
      - microstack-support
      - ovn-chassis
  ovs-appctl:
    command: usr/bin/ovs-appctl
    plugs:
      - network
      - process-control
      - microstack-support
      - ovn-chassis
  ovs-ofctl:
    command: usr/bin/ovs-ofctl
    plugs:
      - network
      - process-control
      - microstack-support
      - ovn-chassis
  ovs-dpctl:
    command: usr/bin/ovs-dpctl
    plugs:
      - network
      - network-control
      - process-control
      - microstack-support
      - ovn-chassis

  nova-compute:
    command: 'bin/nova-compute-service'
    after: [libvirtd]
    daemon: simple
    plugs:
      - network
      - network-bind
      - network-control
      - ovn-chassis
      - firewall-control
      - hardware-observe
      - kvm
      - microstack-support
      # Needs access to block devices so that blockdev --flushbufs works.
      - block-devices
      - iscsi-initiator
      - dm-multipath
      - process-control
      - mount-observe
      - nvme-control

  neutron-ovn-metadata-agent:
    command: 'bin/neutron-ovn-metadata-agent-service'
    daemon: simple
    plugs:
      - network
      - network-bind
      - network-control
      - network-observe
      - ovn-chassis
      - microstack-support
      - firewall-control

  neutron-sriov-nic-agent:
    command: 'bin/neutron-sriov-nic-agent-service'
    daemon: simple
    plugs:
      - network
      - network-bind
      - network-control
      - network-observe
      - hardware-observe
      - microstack-support

  nova-api-metadata:
    command: 'bin/nova-api-metadata-service'
    daemon: simple
    plugs:
      - network
      - network-bind
      - firewall-control
      - microstack-support

  ceilometer-compute-agent:
    command: 'bin/ceilometer-compute-agent-service'
    after: [libvirtd]
    daemon: simple
    plugs:
      - network
      - network-bind
      - firewall-control
      - microstack-support

  masakari-instancemonitor:
    command: 'bin/masakari-instancemonitor-service'
    after: [libvirtd]
    daemon: simple
    plugs:
      - network
      - network-bind
      - firewall-control
      - microstack-support

  pre-evacuation-setup:
    command: 'bin/pre-evacuation-setup-service'
    after: [libvirtd]
    daemon: simple
    plugs:
      - network
      - network-bind
      - firewall-control
      - microstack-support
      
  file-transfer:
    command: 'bin/file-transfer-service'
    daemon: simple
    restart-condition: on-failure
    plugs:
      - network
      - network-bind

  libvirt-exporter:
    daemon: simple
    install-mode: disable
    restart-condition: on-abnormal
    command: 'bin/libvirt-exporter --web.listen-address :9177 --web.telemetry-path /metrics --libvirt.uri qemu:///system'
    plugs:
      - libvirt
      - network-bind

  ovs-exporter:
    command: 'bin/ovs-exporter-service'
    plugs:
      - network-bind
    daemon: simple
    install-mode: disable

parts:
  kvm-support:
    plugin: nil
    stage-packages:
    - on amd64:
      - msr-tools

  ovs-exporter:
    plugin: go
    source: https://github.com/greenpau/ovs_exporter.git
    source-tag: v1.0.7
    build-packages:
      - gcc
      - golang-go
    override-build: |
      GIT_COMMIT=$(git describe --dirty --always)
      GIT_BRANCH=$(git rev-parse --abbrev-ref HEAD -- | head -1)
      BUILD_USER=snapcraft
      BUILD_DATE=$(date +"%Y-%m-%d")
      BINARY=ovs-exporter
      VERBOSE=-v
      PROJECT=ovs_exporter
      PKG_DIR=pkg/ovs_exporter
      mkdir -p ./bin/
      CGO_ENABLED=0 go build -o ./bin/${BINARY} \
      -ldflags="-w -s \
      -X github.com/prometheus/common/version.Version=$SNAPCRAFT_PROJECT_VERSION \
      -X github.com/prometheus/common/version.Revision=$GIT_COMMIT \
      -X github.com/prometheus/common/version.Branch=$GIT_BRANCH \
      -X github.com/prometheus/common/version.BuildUser=$BUILD_USER \
      -X github.com/prometheus/common/version.BuildDate=$BUILD_DATE \
      -X ${PROJECT}/${PKG_DIR}.appName=$BINARY \
      -X ${PROJECT}/${PKG_DIR}.appVersion=$SNAPCRAFT_PROJECT_VERSION \
      -X ${PROJECT}/${PKG_DIR}.gitBranch=$GIT_BRANCH \
      -X ${PROJECT}/${PKG_DIR}.gitCommit=$GIT_COMMIT \
      -X ${PROJECT}/${PKG_DIR}.buildUser=$BUILD_USER \
      -X ${PROJECT}/${PKG_DIR}.buildDate=$BUILD_DATE" \
      ./cmd/ovs_exporter/*.go
    override-prime: |
      craftctl default
      install -D $SNAPCRAFT_PART_SRC/../build/bin/ovs-exporter bin/ovs-exporter

  qemu:
    source: https://git.launchpad.net/ubuntu/+source/qemu
    source-type: git
    source-branch: ubuntu/noble-updates
    source-depth: 1
    plugin: autotools
    stage-packages:
      - seabios
      - qemu-system-data
      - ipxe-qemu
      # UEFI Support, required on arm64
      - on arm64:
        - qemu-efi-aarch64
        - qemu-efi-arm
        - libspice-server1
      - on amd64:
        - ovmf
        - libspice-server1
      - libglut3.12 # provides libglut.so.3
      - libnuma1
      - libasound2t64
      - libasyncns0
      - libbluetooth3
      - libboost-iostreams1.74.0
      - libboost-random1.74.0
      - libboost-system1.74.0
      - libboost-thread1.74.0
      - libcaca0
      - libfdt1
      - libflac++10
      - libglib2.0-0
      - libglu1-mesa
      - libiscsi7
      - libjpeg-turbo8
      - libnspr4
      - libnss3
      - libogg0
      - libopus0
      - libpixman-1-0
      - libpulse0
      - librados2
      - librbd1
      - libsdl1.2debian
      - libslang2
      - libsndfile1
      - libusb-1.0-0
      - libusbredirparser1
      - libvorbis0a
      - libvorbisenc2
      - libx11-6
      - libxi6
      - libxau6
      - libxcb1
      - libxdmcp6
      - libxext6
      - libpng16-16
      - libaio1t64
      - libasn1-8-heimdal
      - libbrotli1
      - libcurl3t64-gnutls
      - libgssapi3t64-heimdal
      - libhcrypto5t64-heimdal
      - libheimbase1-heimdal
      - libheimntlm0-heimdal
      - libhx509-5-heimdal
      - libkrb5-26-heimdal
      - libldap2
      - libnghttp2-14
      - libpsl5
      - libroken19t64-heimdal
      - librtmp1
      - libssh-4
      - libwind0-heimdal
      - libjack0
      - libepoxy0
      - libcacard0
      - libnettle8
    build-packages:
      - bison
      - flex
      - libaio-dev
      - libjack-dev
      - libpulse-dev
      - libasound2-dev
      - libcap-ng-dev
      - libfdt-dev
      - libiscsi-dev
      - libepoxy-dev
      - libdrm-dev
      - libnuma-dev
      - libcacard-dev
      - libpixman-1-dev
      - librbd-dev
      - libsasl2-dev
      - libusb-1.0-0-dev
      - libusbredirparser-dev
      - libzstd-dev
      - zlib1g-dev
      - libudev-dev
      - libjpeg-dev
      - libpng-dev
      - on amd64:
        - libspice-server-dev
        - libpmem-dev
        - acpica-tools
      - on arm64:
        - libspice-server-dev
        - libpmem-dev
        - acpica-tools
      - nettle-dev
      - gcc
      - meson
      - ninja-build
      - execstack
    autotools-configure-parameters:
      - --enable-system
      - --target-list=x86_64-softmmu,aarch64-softmmu
      - --disable-install-blobs
      - --disable-user
      - --disable-linux-user
      - --disable-bsd-user
      - --disable-xen
      - --disable-werror
      - --prefix=/usr
      - --localstatedir=/var/snap/$CRAFT_PROJECT_NAME/common
      - --sysconfdir=/var/snap/$CRAFT_PROJECT_NAME/common
      - --firmwarepath=/snap/$CRAFT_PROJECT_NAME/current/usr/share/seabios:/snap/$CRAFT_PROJECT_NAME/current/usr/share/seabios/optionrom:/snap/$CRAFT_PROJECT_NAME/current/usr/share/qemu:/snap/$CRAFT_PROJECT_NAME/current/usr/lib/ipxe/qemu
    override-build: |
      dpkg-source --before-build .
      craftctl default

      # Install keymaps as the qemu build process does not!
      install -Dp -m0644 -t $CRAFT_PART_INSTALL/usr/share/qemu/keymaps $(ls -1 $CRAFT_PART_SRC/pc-bios/keymaps/* | fgrep -v /meson.build)
    override-prime: |
      craftctl default
      for f in $(execstack -q $CRAFT_PRIME/usr/share/qemu/* 2>/dev/null| grep -e "^X" | cut -d " " -f2); do
          execstack --clear-execstack $f
      done

  libvirt:
    source: https://git.launchpad.net/ubuntu/+source/libvirt
    source-type: git
    source-branch: ubuntu/noble-updates
    source-depth: 1
    after:
      - qemu
    plugin: meson
    build-packages:
    - libxml2-dev
    - libxml-libxml-perl
    - libcurl4-gnutls-dev
    - libncurses-dev
    - libreadline-dev
    - zlib1g-dev
    - libgcrypt20-dev
    - libgnutls28-dev
    - libyajl-dev
    - libpcap0.8-dev
    - libaudit-dev
    - libdevmapper-dev
    - libpciaccess-dev
    - libnl-3-dev
    - libnl-route-3-dev
    - libtirpc-dev
    - libxml2-utils
    - uuid-dev
    - libnuma-dev
    - python3-all
    - python3-six
    - wget
    - dpkg-dev
    - xsltproc
    - libapparmor-dev
    - rsync
    - open-iscsi
    - python3-docutils
    - gettext
    - meson
    - ninja-build
    stage-packages:
    - on amd64:
      - dmidecode
    - on arm64:
      - dmidecode
    - dnsmasq
    - iptables
    - genisoimage
    - libxml2
    - libyajl2
    - libnuma1
    - libcurl3-gnutls
    - libpcap0.8
    - libpciaccess0
    # libvirt uses the pm-is-supported tool.
    - pm-utils
    - ebtables
    - apparmor
    - libapparmor1
    - swtpm
    - swtpm-tools
    - libtpms0
    meson-parameters:
    # Hypervisors
    - -Ddriver_qemu=enabled
    - -Ddriver_libvirtd=enabled
    - -Ddriver_remote=enabled
    - -Ddriver_ch=disabled
    - -Ddriver_bhyve=disabled
    - -Ddriver_openvz=disabled
    - -Ddriver_vmware=disabled
    - -Ddriver_esx=disabled
    - -Ddriver_hyperv=disabled
    - -Ddriver_lxc=disabled
    - -Ddriver_vz=disabled
    - -Ddriver_vbox=disabled
    # QEMU options
    - -Dqemu_user=root
    - -Dqemu_group=root
    # Security Features
    - -Dsasl=disabled
    - -Dselinux=disabled
    - -Dsecdriver_selinux=disabled
    - -Dapparmor=disabled
    - -Dapparmor_profiles=disabled
    - -Dsecdriver_apparmor=disabled
    # Storage Drivers
    - -Dstorage_iscsi=enabled
    - -Dstorage_rbd=enabled
    - -Dstorage_lvm=disabled
    - -Dstorage_vstorage=disabled
    - -Dstorage_zfs=disabled
    - -Dstorage_scsi=disabled
    - -Dglusterfs=disabled
    # General
    - -Ddocs=disabled
    - -Dbuildtype=release
    - -Dstrip=true
    - -Dtests=disabled
    # Installation
    - -Dchrdev_lock_files=/run/lock
    - -Dprefix=/snap/$CRAFT_PROJECT_NAME/current/usr
    - -Dbindir=/snap/$CRAFT_PROJECT_NAME/current/usr/bin
    - -Dsbindir=/snap/$CRAFT_PROJECT_NAME/current/usr/sbin
    - -Dlibexecdir=/snap/$CRAFT_PROJECT_NAME/current/usr/libexec
    - -Dlibdir=/snap/$CRAFT_PROJECT_NAME/current/usr/lib
    - -Dincludedir=/snap/$CRAFT_PROJECT_NAME/current/usr/include
    - -Dlocalstatedir=/var/snap/$CRAFT_PROJECT_NAME/common
    - -Dsysconfdir=/var/snap/$CRAFT_PROJECT_NAME/common/etc
    override-build: |
      dpkg-source --before-build $CRAFT_PART_SRC
      echo "

      /* Disable SETGROUPS usage */
      #undef WITH_SETGROUPS
      #define WITH_SETGROUPS 0

      /*
       * Ensure that some compile time detected binary locations are
       * overridden for the runtime locations in the installed snap
       */
      #undef DNSMASQ
      #define DNSMASQ \"/snap/$CRAFT_PROJECT_NAME/current/usr/sbin/dnsmasq\"
      #undef DMIDECODE
      #define DMIDECODE \"/snap/$CRAFT_PROJECT_NAME/current/usr/sbin/dmidecode\"
      #undef OVS_VSCTL
      #define OVS_VSCTL \"/snap/$CRAFT_PROJECT_NAME/current/usr/local/bin/ovs-vsctl\"
      #undef IPTABLES
      #define IPTABLES \"/snap/$CRAFT_PROJECT_NAME/current/usr/sbin/iptables-legacy\"
      #undef IP6TABLES
      #define IP6TABLES \"/snap/$CRAFT_PROJECT_NAME/current/usr/sbin/ip6tables-legacy\"
      #undef EBTABLES
      #define EBTABLES \"/snap/$CRAFT_PROJECT_NAME/current/usr/sbin/ebtables-legacy\"
      " >> $CRAFT_PART_SRC/config.h

      pushd $CRAFT_PART_SRC
      git am $CRAFT_PROJECT_DIR/snap/patches/libvirt/*.patch
      popd || exit 1

      craftctl default

      rsync --remove-source-files -arhvP $CRAFT_PART_INSTALL/snap/$CRAFT_PROJECT_NAME/current/usr/* $CRAFT_PART_INSTALL/usr/
      rm -rf $CRAFT_PART_INSTALL/snap/$CRAFT_PROJECT_NAME/current/usr

  templates:
    source: templates/
    plugin: dump
    organize:
      '*': templates/

  bin:
    source: bin/
    plugin: dump
    organize:
      '*': bin/

  networking:
    plugin: nil
    stage-packages:
      - openvswitch-switch
      - on amd64:
        - openvswitch-switch-dpdk
        - librte-meta-all
        - driverctl
      - on arm64:
        - openvswitch-switch-dpdk
        - librte-meta-all
        - driverctl
      - ovn-host
    override-build: |
      craftctl default
      if [ -f $CRAFT_PART_INSTALL/usr/lib/openvswitch-switch-dpdk/ovs-vswitchd-dpdk ]; then
          mv $CRAFT_PART_INSTALL/usr/lib/openvswitch-switch-dpdk/ovs-vswitchd-dpdk $CRAFT_PART_INSTALL/usr/sbin/ovs-vswitchd
      fi

  apache2-webdav:
    plugin: nil
    stage-packages:
      - apache2

  openstack:
    plugin: nil
    build-packages:
      - patch
      - python3-pip
    stage-packages:
      - ceilometer-agent-compute
      - python3-nova
      - python3-neutron
      - python3-masakari-monitors
      - python3-os-vif
      - python3-os-brick
      - python3-setuptools
      - python3-pkg-resources
      - python3-systemd
      - python3-tz
      - haproxy
      - util-linux
      - multipath-tools
      # following packages are explicitly declared, because they are inside core24
      # removed when core24 bug is fixed
      - python3-attr
      - python3-chardet
      - python3-cryptography
      - python3-cffi-backend
      - python3-dbus
      - python3-idna
      - python3-jinja2
      - python3-jsonschema
      - python3-jsonpatch
      - python3-json-pointer
      - python3-pyrsistent
      - python3-requests
      - python3-urllib3
      - python3-yaml
    override-build: |
      craftctl default
      # NOTE:
      # purge libvirt0 provided components to avoid
      # conflicts with the libvirt part provided versions
      rm -rf $CRAFT_PART_INSTALL/usr/share/libvirt
      rm -rf $CRAFT_PART_INSTALL/usr/lib/*/libvirt*
      # purge some dangling symlinks
      rm -rf $CRAFT_PART_INSTALL/usr/lib/python3/dist-packages/netaddr/eui/iab.txt
      rm -rf $CRAFT_PART_INSTALL/usr/lib/python3/dist-packages/netaddr/eui/oui.txt
      # drop some docutils binaries to avoid libvirt part build confusion
      rm -rf $CRAFT_PART_INSTALL/usr/bin/rst2*
      # Install webdav4 for Nova's HttpDriver (not available as Debian package)
      pip3 install --target=$CRAFT_PART_INSTALL/usr/lib/python3/dist-packages webdav4
    override-prime: |
      craftctl default
      pushd "$CRAFT_PRIME/usr/lib/python3/dist-packages"
      path="$CRAFT_PROJECT_DIR/snap/patches/nova/0001-remotefs-http-driver.patch"
      # Unapply patch, ignore on failure
      patch -p1 --reverse --forward --quiet --batch --reject-file=/dev/null --input "$path" || true
      patch -p1 --forward --input="$path"
      popd

  openstack-hypervisor:
    plugin: python
    source: .
    build-snaps: [astral-uv]
    build-packages:
      - git
      - cargo
      - rustc
    python-requirements:
      - requirements.txt
    after:
      - openstack
      - apache2-webdav
    override-build: |
      uv export --frozen --no-hashes --format=requirements-txt -o requirements.txt
      craftctl default
      snap-helpers write-hooks

  libvirt-exporter:
    plugin: go
    source-tag: 2.3.3
    source-type: git
    source: https://github.com/Tinkoff/libvirt-exporter
    build-snaps:
      - go
    after:
      - libvirt
    build-environment:
      - CGO_CFLAGS: "-I$CRAFT_STAGE/usr/include"
      - CGO_LDFLAGS: "-L$CRAFT_STAGE/usr/lib"

  # TODO: drop the following once https://github.com/canonical/netplan/pull/549
  # gets backported.
  netplan:
    plugin: nil
    source-tag: main
    source-type: git
    source: https://github.com/canonical/netplan
    build-packages:
      # - netplan.io-build-deps-depends
      - build-essential
      - debhelper-compat
      - dh-sequence-python3
      - pkgconf
      - bash-completion
      - libyaml-dev
      - libglib2.0-dev
      - uuid-dev
      - python3
      - python3-cffi
      - python3-coverage
      - python3-pytest
      - python3-pytest-cov
      - python3-rich
      - python3-yaml
      - libcmocka-dev
      - libpython3-dev
      - libsystemd-dev
      - udev
      - systemd
      - systemd-dev
      - dbus-x11
      - pyflakes3
      - pycodestyle
      - pandoc
      - openvswitch-switch
      - meson
      - iproute2
    stage-packages:
      - netplan.io
    build-environment:
      - DEBIAN_FRONTEND: "noninteractive"
    after: [openstack]
    override-build: |
      meson setup _build -Dunit_testing=false --prefix=/usr
      meson compile -C _build
      meson install -C _build --destdir $CRAFT_PART_INSTALL

slots:
  hypervisor-config:
    interface: content
    content: openstack-hypervisor
    source:
      write:
        - $SNAP_DATA/run/hypervisor-config

  consul-socket:
    interface: content
    content: consul-unix-sock
    source:
      write:
        - $SNAP_DATA/hypervisor

hooks:
  install:
    plugs: [ network, microstack-support]
  configure:
    plugs:
      - network
      - network-control
      - network-setup-control
      - hardware-observe
      - kernel-module-control
      - firewall-control
      - microstack-support
      - kvm
      - epa-info
      - etc-driverctl
      - ovn-chassis
      - dm-multipath
  connect-slot-hypervisor-config:
    plugs:
      - network
      - network-bind
      - microstack-support

plugs:
  epa-info:
    interface: content
    content: epa-info
    target: $SNAP_DATA
  # Required in order to persistently bind drivers such as vfio-pci.
  etc-driverctl:
    interface: system-files
    write:
    - /etc/driverctl.d
  ovn-chassis:
    interface: content
    target: $SNAP_DATA/microovn/chassis
